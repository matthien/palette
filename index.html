<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>palette</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,700&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── LANDING ── -->
  <div class="screen active" id="landing">
    <canvas class="aurora-canvas" id="auroraCanvas"></canvas>
    <div class="landing-inner">
      <h1 class="tagline">Find your musical color palette</h1>
      <p class="subtitle">Your playlist favorites, translated into color.</p>
      <button class="spotify-btn" id="spotifyBtn">
        <svg class="spotify-icon" viewBox="0 0 24 24" fill="currentColor" width="20" height="20" aria-hidden="true">
          <path d="M12 0C5.4 0 0 5.4 0 12s5.4 12 12 12 12-5.4 12-12S18.66 0 12 0zm5.521 17.34c-.24.359-.66.48-1.021.24-2.82-1.74-6.36-2.101-10.561-1.141-.418.122-.779-.179-.899-.539-.12-.421.18-.78.54-.9 4.56-1.021 8.52-.6 11.64 1.32.42.18.479.659.301 1.02zm1.44-3.3c-.301.42-.841.6-1.262.3-3.239-1.98-8.159-2.58-11.939-1.38-.479.12-1.02-.12-1.14-.6-.12-.48.12-1.021.6-1.141C9.6 9.9 15 10.561 18.72 12.84c.361.181.54.78.241 1.2zm.12-3.36C15.24 8.4 8.82 8.16 5.16 9.301c-.6.179-1.2-.181-1.38-.721-.18-.601.18-1.2.72-1.381 4.26-1.26 11.28-1.02 15.721 1.621.539.3.719 1.02.419 1.56-.299.421-1.02.599-1.559.3z"/>
        </svg>
        Continue with Spotify
      </button>
    </div>
    <p class="landing-byline">Matthew Thien</p>
  </div>

  <!-- ── PICKER ── -->
  <div class="screen" id="picker">
    <button class="logout-btn" id="logoutBtn">log out</button>
    <div class="error-toast" id="errorToast">
      <span class="error-label">ERROR</span>
      <span class="error-msg">Playlist has less than 25 songs</span>
    </div>
    <div class="picker-inner">
      <div class="picker-head">
        <h2 class="picker-title">Choose a playlist</h2>
        <p class="picker-sub">Select a playlist that has atleast 25 songs.</p>
      </div>
      <div class="grid" id="playlistGrid"></div>
      <div class="load-more-wrap" id="loadMoreWrap">
        <button class="pill-btn" id="loadMoreBtn">
          <span class="pill-btn-inner">Load more</span>
        </button>
      </div>
    </div>
  </div>

  <!-- ── LOADING ── -->
  <div class="screen" id="loading">
    <div class="dots-loader"><i></i><i></i><i></i></div>
    <p class="load-text" id="loadText">reading your playlist…</p>
  </div>

  <!-- ── RESULTS ── -->
  <div class="screen" id="results">
    <canvas class="result-bg" id="resultBg"></canvas>
    <div class="results-top-left">
      <button class="back-btn" id="backBtn">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
          <path d="M10 12L6 8L10 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        back
      </button>
      <div class="plist-header">
        <p class="plist-label">YOUR PLAYLIST</p>
        <span class="plist-name" id="plistName">—</span>
      </div>
    </div>
    <div class="dots-layer" id="dotsLayer"></div>
  </div>

  <div class="bloom" id="bloom"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/color-thief/2.3.2/color-thief.umd.js"></script>
  <script src="main.js"></script>
</body>
</html>
