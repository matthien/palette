<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>palette</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500&family=Geist+Mono:wght@400&family=Source+Serif+4:ital,opsz,wght@0,8..60,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ── LANDING ── -->
  <div class="screen active" id="landing">
    <div class="conic-wrap"></div>
    <div class="landing-vignette"></div>
    <div class="landing-inner">
      <h1 class="tagline">Find your musical<br>color palette.</h1>
      <div class="input-wrap">
        <input
          class="url-input"
          id="urlInput"
          type="text"
          placeholder="Paste Spotify playlist link here…"
          autocomplete="off"
          spellcheck="false"
        />
        <button class="gen-btn" id="genBtn">Generate  →</button>
      </div>
    </div>
  </div>

  <!-- ── LOADING ── -->
  <div class="screen" id="loading">
    <div class="blob-bg">
      <div class="blob b1"></div>
      <div class="blob b2"></div>
      <div class="blob b3"></div>
      <div class="blob b4"></div>
      <div class="blob b5"></div>
    </div>
    <div class="loading-overlay"></div>
    <div class="dots-loader"><i></i><i></i><i></i></div>
    <p class="load-text" id="loadText">reading your playlist…</p>
  </div>

  <!-- ── RESULTS ── -->
  <div class="screen" id="results">
    <canvas class="result-bg" id="resultBg"></canvas>
    <div class="plist-header">
      <p class="plist-label">Your Playlist</p>
      <span class="plist-name" id="plistName">—</span>
    </div>
    <div class="dots-layer" id="dotsLayer"></div>
    <button class="back-btn" id="backBtn">← new playlist</button>
  </div>

  <script src="main.js"></script>
</body>
</html>
